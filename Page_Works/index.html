<!DOCTYPE html>
//THIS IS ALSO MADE BY CHONCITO
<html>
<head>
  <title>Fecha Actual</title>
  <style>
    body {
      background-color: #cccccc;
      font-family: Arial;
      margin: 20px;
    }

    h1 {
      color: navy;
      text-decoration: underline;
    }

    #fecha {
      border: 2px solid black;
      background-color: white;
      padding: 10px;
      width: 400px;
      font-size: 16px;
      margin-top: 15px;
    }

    p {
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>Fecha Actual</h1>
  <p>La fecha de hoy es:</p>
  <div id="fecha"></div>

  <script>
    var hoy = new Date();

    var numeroDia = hoy.getDay();       // 0=domingo ... 6=sábado
    var numeroMes = hoy.getMonth();     // 0=enero ... 11=diciembre
    var dia       = hoy.getDate();      // 1-31
    var anio      = hoy.getFullYear();  // ej. 2026

    var nombreDia;
    switch (numeroDia) {
      case 0: nombreDia = "domingo";    break;
      case 1: nombreDia = "lunes";      break;
      case 2: nombreDia = "martes";     break;
      case 3: nombreDia = "miércoles";  break;
      case 4: nombreDia = "jueves";     break;
      case 5: nombreDia = "viernes";    break;
      case 6: nombreDia = "sábado";     break;
    }

    var nombreMes;
    switch (numeroMes) {
      case 0:  nombreMes = "enero";      break;
      case 1:  nombreMes = "febrero";    break;
      case 2:  nombreMes = "marzo";      break;
      case 3:  nombreMes = "abril";      break;
      case 4:  nombreMes = "mayo";       break;
      case 5:  nombreMes = "junio";      break;
      case 6:  nombreMes = "julio";      break;
      case 7:  nombreMes = "agosto";     break;
      case 8:  nombreMes = "septiembre"; break;
      case 9:  nombreMes = "octubre";    break;
      case 10: nombreMes = "noviembre";  break;
      case 11: nombreMes = "diciembre";  break;
    }

    var texto = "Hoy es " + nombreDia + " " + dia + " de " + nombreMes + " del año " + anio;

    document.getElementById("fecha").textContent = texto;
  </script>

</body>
</html>
