<!DOCTYPE html>
<html>
  //AGAIN THIS IS MADE CHONCITO good
<head>
  <title>Tablas del 1 al 10</title>
  <style>
    body {
      background-color: #cccccc;
      font-family: Arial;
      margin: 20px;
    }

    h1 {
      color: navy;
      text-decoration: underline;
    }

    button {
      background-color: gray;
      color: white;
      border: 3px outset #888;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 14px;
    }

    button:active {
      border-style: inset;
    }

    #resultado {
      margin-top: 20px;
    }

    .tabla {
      display: inline-block;
      border: 2px solid black;
      margin: 5px;
      padding: 8px;
      background-color: white;
      vertical-align: top;
      width: 160px;
    }

    .tabla h3 {
      color: red;
      margin: 0 0 5px 0;
      font-size: 14px;
      border-bottom: 1px solid black;
    }

    .tabla p {
      margin: 2px 0;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <h1>Tablas de Multiplicar del 1 al 10</h1>
  <button onclick="generarTablas()">Generar tablas de multiplicar</button>

  <div id="resultado"></div>

  <script>
    function generarTablas() {
      var contenedor = document.getElementById("resultado");
      contenedor.innerHTML = "";

      // Ciclo FOR: recorre las tablas del 1 al 10
      for (var i = 1; i <= 10; i++) {
        var div = document.createElement("div");
        div.className = "tabla";

        var titulo = document.createElement("h3");
        titulo.textContent = "Tabla del " + i;
        div.appendChild(titulo);

        // Ciclo WHILE: genera los renglones del 1 al 10
        var j = 1;
        while (j <= 10) {
          var p = document.createElement("p");
          p.textContent = i + " × " + j + " = " + (i * j);
          div.appendChild(p);
          j++;
        }

        contenedor.appendChild(div);
      }
    }
  </script>

</body>
</html>
