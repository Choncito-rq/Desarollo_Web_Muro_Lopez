<!DOCTYPE html>
<html>
<head>
  <title>Fórmula General</title>
</head>
<body>

  <h1>Fórmula General (Ecuación de Segundo Grado)</h1>
  <p>Sean Muro Lopez - 301 - Ingenieria en Software</p>

  <br>

  <br><br>

  <!-- Formulario para capturar a, b y c -->
  <label>Valor de a: </label>
  <input type="number" id="a">
  <br><br>

  <label>Valor de b: </label>
  <input type="number" id="b">
  <br><br>

  <label>Valor de c: </label>
  <input type="number" id="c">
  <br><br>

  <button onclick="calcular()">Calcular x1 y x2</button>

  <br><br>

  <!-- Resultado -->
  <p id="resultado"></p>

  <script>

    function calcular() {

      var a = Number(document.getElementById("a").value);
      var b = Number(document.getElementById("b").value);
      var c = Number(document.getElementById("c").value);

      // Calcular el discriminante
      var discriminante = (b * b) - (4 * a * c);

      // Verificar si tiene solución real
      if (discriminante < 0) {
        document.getElementById("resultado").innerHTML = "No tiene solución real (discriminante negativo)";
      } else {
        var x1 = (-b + Math.sqrt(discriminante)) / (2 * a);
        var x2 = (-b - Math.sqrt(discriminante)) / (2 * a);

        document.getElementById("resultado").innerHTML =
          "Discriminante: " + discriminante + "<br>" +
          "x1 = " + x1 + "<br>" +
          "x2 = " + x2;
      }

    }

  </script>

</body>
</html>
