<!DOCTYPE html>
<html>
<head>
  <title>Operaciones Aritméticas en JavaScript</title>
</head>
<body>

  <h1>Operaciones Aritméticas en JavaScript</h1>
  <p>Sean Muro Lopez - 301 - Ingenieria en Software</p>

  <h2>Variables</h2>
  <p id="variables"></p>

  <h2>Suma</h2>
  <p id="suma"></p>

  <h2>Resta</h2>
  <p id="resta"></p>

  <h2>División</h2>
  <p id="division"></p>

  <h2>Exponenciación</h2>
  <p id="exponenciacion"></p>

  <script>

    // Declaración de variables
    var a = 10;
    var b = 2;

    // Mostrar variables
    document.getElementById("variables").innerHTML = "a = " + a + " | b = " + b;

    // Suma
    document.getElementById("suma").innerHTML = a + " + " + b + " = " + (a + b);

    // Resta
    document.getElementById("resta").innerHTML = a + " - " + b + " = " + (a - b);

    // División
    document.getElementById("division").innerHTML = a + " / " + b + " = " + (a / b);

    // Exponenciación
    document.getElementById("exponenciacion").innerHTML = a + " ** " + b + " = " + (a ** b);

  </script>

</body>
</html>
