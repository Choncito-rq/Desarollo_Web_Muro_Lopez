<!DOCTYPE html>
<html>
<head>
  <title>Calculadora con Formulario</title>
</head>
<body>

  <h1>Operaciones Aritméticas</h1>
  <p>Sean Muro Lopez - 301 - Ingenieria en Software</p>

  <br>

  <!-- Cajas de texto para ingresar los valores -->
  <label>Valor de A: </label>
  <input type="number" id="a" value="10">
  <br><br>
  <label>Valor de B: </label>
  <input type="number" id="b" value="2">

  <br><br>

  <!-- Botones para cada operación -->
  <button onclick="sumar()">Suma</button>
  <button onclick="restar()">Resta</button>
  <button onclick="dividir()">División</button>
  <button onclick="exponenciar()">Exponenciación</button>

  <br><br>

  <!-- Aquí se muestra el resultado -->
  <p id="resultado"></p>

  <script>

    function sumar() {
      var a = Number(document.getElementById("a").value);
      var b = Number(document.getElementById("b").value);
      document.getElementById("resultado").innerHTML = "Suma: " + a + " + " + b + " = " + (a + b);
    }

    function restar() {
      var a = Number(document.getElementById("a").value);
      var b = Number(document.getElementById("b").value);
      document.getElementById("resultado").innerHTML = "Resta: " + a + " - " + b + " = " + (a - b);
    }

    function dividir() {
      var a = Number(document.getElementById("a").value);
      var b = Number(document.getElementById("b").value);
      document.getElementById("resultado").innerHTML = "División: " + a + " / " + b + " = " + (a / b);
    }

    function exponenciar() {
      var a = Number(document.getElementById("a").value);
      var b = Number(document.getElementById("b").value);
      document.getElementById("resultado").innerHTML = "Exponenciación: " + a + " ** " + b + " = " + (a ** b);
    }

  </script>

</body>
</html>
