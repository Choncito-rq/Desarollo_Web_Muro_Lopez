<!DOCTYPE html>
<html>
<head>
  <title>Calculadora de IMC - Mujer</title>
</head>
<body>

  <h1>Calculadora de Índice de Masa Corporal (IMC)</h1>
  <p>Sean Muro Lopez - 301 - Ingenieria en Software</p>

  <br>

  <br><br>

  <!-- Formulario -->
  <label>Peso (kg): </label>
  <input type="number" id="peso" placeholder="Ej. 60">
  <br><br>

  <label>Altura (m): </label>
  <input type="number" id="altura" placeholder="Ej. 1.65" step="0.01">
  <br><br>

  <button onclick="calcularIMC()">Calcular IMC</button>

  <br><br>

  <!-- Resultado -->
  <p id="resultado"></p>
  <p id="grado"></p>

  <script>

    function calcularIMC() {

      var peso = Number(document.getElementById("peso").value);
      var altura = Number(document.getElementById("altura").value);

      // Validar que los campos no estén vacíos
      if (peso == 0 || altura == 0) {
        document.getElementById("resultado").innerHTML = "Por favor ingresa el peso y la altura.";
        document.getElementById("grado").innerHTML = "";
        return;
      }

      // Fórmula del IMC: peso / (altura * altura)
      var imc = peso / (altura * altura);
      imc = Math.round(imc * 100) / 100;

      document.getElementById("resultado").innerHTML = "Tu IMC es: " + imc;

      // Clasificación para mujeres
      var grado = "";

      if (imc < 18.5) {
        grado = "Bajo peso";
      } else if (imc >= 18.5 && imc <= 24.9) {
        grado = "Peso normal";
      } else if (imc >= 25 && imc <= 29.9) {
        grado = "Sobrepeso";
      } else if (imc >= 30 && imc <= 34.9) {
        grado = "Obesidad grado I";
      } else if (imc >= 35 && imc <= 39.9) {
        grado = "Obesidad grado II";
      } else {
        grado = "Obesidad grado III (mórbida)";
      }

      document.getElementById("grado").innerHTML = "Clasificación: " + grado;

    }

  </script>

</body>
</html>
