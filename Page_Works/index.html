<!DOCTYPE html>
//MADE IN BY CHONCITO yies yies
<html>
<head>
  <title>Tablas de Multiplicar</title>
  <style>
    body {
      background-color: #cccccc;
      font-family: Arial;
      margin: 20px;
    }

    h1 {
      color: navy;
      text-decoration: underline;
    }

    input {
      border: 2px solid black;
      padding: 3px;
      width: 80px;
    }

    button {
      background-color: gray;
      color: white;
      border: 3px outset #888;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 14px;
    }

    button:active {
      border-style: inset;
    }

    #resultado {
      margin-top: 20px;
    }

    .tabla {
      display: inline-block;
      border: 2px solid black;
      margin: 5px;
      padding: 8px;
      background-color: white;
      vertical-align: top;
      width: 160px;
    }

    .tabla h3 {
      color: red;
      margin: 0 0 5px 0;
      font-size: 14px;
      border-bottom: 1px solid black;
    }

    .tabla p {
      margin: 2px 0;
      font-size: 13px;
    }

    .error {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Generador de Tablas de Multiplicar</h1>

  <p>Ingresa un número positivo y entero:</p>
  <input type="number" id="numero" min="1" placeholder="Ej: 10">
  <br><br>
  <button onclick="generarTablas()">Generar tablas de multiplicar</button>

  <div id="resultado"></div>

  <script>
    function generarTablas() {
      var contenedor = document.getElementById("resultado");
      contenedor.innerHTML = "";

      var entrada = document.getElementById("numero").value;
      var n = parseInt(entrada);

      // Validar que sea un número positivo y entero
      if (entrada === "" || isNaN(n) || n <= 0 || n !== parseFloat(entrada)) {
        contenedor.innerHTML = "<p class='error'>Por favor ingresa un número entero positivo válido.</p>";
        return;
      }

      // Ciclo FOR: recorre del 1 al número ingresado
      for (var i = 1; i <= n; i++) {
        var div = document.createElement("div");
        div.className = "tabla";

        var titulo = document.createElement("h3");
        titulo.textContent = "Tabla del " + i;
        div.appendChild(titulo);

        // Ciclo WHILE: genera los 10 renglones de cada tabla
        var j = 1;
        while (j <= 10) {
          var p = document.createElement("p");
          p.textContent = i + " × " + j + " = " + (i * j);
          div.appendChild(p);
          j++;
        }

        contenedor.appendChild(div);
      }
    }
  </script>

</body>
</html>
